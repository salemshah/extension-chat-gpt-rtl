<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate Icons — ChatGPT RTL Support</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      padding: 32px;
      color: #222;
    }
    h2  { margin-bottom: 6px; }
    p   { color: #555; margin-bottom: 24px; font-size: 14px; }
    code { background: #e8e8e8; padding: 2px 6px; border-radius: 4px; }

    .grid {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
    }

    .card h3 { font-size: 13px; color: #888; margin-bottom: 12px; }

    canvas {
      display: block;
      margin: 0 auto 12px;
      border-radius: 20%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      image-rendering: pixelated;
    }

    a.dl {
      display: inline-block;
      padding: 7px 18px;
      background: #10a37f;
      color: #fff;
      border-radius: 7px;
      text-decoration: none;
      font-size: 12.5px;
      font-weight: 500;
      transition: background 0.15s;
    }
    a.dl:hover { background: #0d8f70; }

    .note {
      margin-top: 28px;
      font-size: 13px;
      color: #888;
      background: #fff;
      border-radius: 10px;
      padding: 14px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      max-width: 540px;
    }
  </style>
</head>
<body>

<h2>ChatGPT RTL Support — Icon Generator</h2>
<p>
  Click each <strong>Download</strong> button and save the file to the
  <code>icons/</code> folder inside the extension directory.
</p>

<div class="grid" id="grid"></div>

<div class="note">
  After saving all three icons, reload the extension in
  <strong>chrome://extensions</strong> → find the extension → click the
  refresh icon.
</div>

<script>
  const BG      = '#10a37f';
  const FG      = '#ffffff';
  const SIZES   = [16, 48, 128];

  function drawIcon(size) {
    const canvas = document.createElement('canvas');
    canvas.width  = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const r   = Math.round(size * 0.20); // corner radius

    // Rounded-rectangle background
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = BG;
    ctx.fill();

    ctx.fillStyle    = FG;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    if (size >= 48) {
      // "RTL" label + left-arrow symbol
      ctx.font = `bold ${Math.round(size * 0.27)}px Arial, sans-serif`;
      ctx.fillText('RTL', size / 2, size * 0.40);
      ctx.font = `${Math.round(size * 0.26)}px Arial, sans-serif`;
      ctx.fillText('←', size / 2, size * 0.68);
    } else {
      // Tiny icon: just the letter R
      ctx.font = `bold ${Math.round(size * 0.58)}px Arial, sans-serif`;
      ctx.fillText('R', size / 2, size * 0.52);
    }

    return canvas;
  }

  SIZES.forEach(size => {
    const canvas = drawIcon(size);
    canvas.style.width  = Math.min(size, 128) + 'px';
    canvas.style.height = Math.min(size, 128) + 'px';

    const link       = document.createElement('a');
    link.href        = canvas.toDataURL('image/png');
    link.download    = `icon${size}.png`;
    link.textContent = `Download icon${size}.png`;
    link.className   = 'dl';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${size} × ${size} px</h3>`;
    card.appendChild(canvas);
    card.appendChild(link);

    document.getElementById('grid').appendChild(card);
  });
</script>
</body>
</html>
